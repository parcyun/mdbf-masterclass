<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar — the Masterclass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 108px;
  overflow: visible;
}

body {
  background: rgba(7, 9, 20, 0.97);
  border-bottom: 1px solid rgba(51, 100, 217, 0.15);
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ===== Row 1: Logo · Search · MDBF ===== */
.nav-row1 {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 20px;
}

/* Logo */
.nav-logo {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: #fff;
  text-decoration: none;
  letter-spacing: -0.03em;
  flex-shrink: 0;
  display: flex;
  align-items: baseline;
  line-height: 1;
}

.logo-the {
  font-size: 14px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.38);
  margin-right: 4px;
  letter-spacing: 0.01em;
}

.logo-M { color: #3364D9; }

/* Search */
.nav-search {
  flex: 1;
  max-width: 420px;
  position: relative;
}

.nav-search input {
  width: 100%;
  height: 38px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 100px;
  padding: 0 16px 0 38px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.8);
  font-family: 'Pretendard', sans-serif;
  letter-spacing: -0.01em;
  transition: all 0.2s ease;
  outline: none;
}

.nav-search input::placeholder { color: rgba(255, 255, 255, 0.28); }

.nav-search input:focus {
  background: rgba(255, 255, 255, 0.09);
  border-color: rgba(51, 100, 217, 0.5);
  box-shadow: 0 0 0 3px rgba(51, 100, 217, 0.12);
}

.search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: rgba(255, 255, 255, 0.3);
}

/* 몽당분필 */
.nav-mdbf {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: rgba(255, 255, 255, 0.6);
  font-size: 13px;
  font-weight: 500;
  padding: 7px 13px;
  border-radius: 9px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.2s ease;
  flex-shrink: 0;
  letter-spacing: -0.01em;
  margin-left: auto;
}

.nav-cat-link {
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-mdbf img {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  flex-shrink: 0;
}

.nav-mdbf:hover {
  color: rgba(255, 255, 255, 0.9);
  border-color: rgba(51, 100, 217, 0.4);
  background: rgba(51, 100, 217, 0.08);
}

/* ===== Row 2: Menu ===== */
.nav-row2 {
  border-top: 1px solid rgba(255, 255, 255, 0.05);
}

.nav-menu {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 32px;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 2px;
  list-style: none;
  justify-content: center;
}

.nav-menu a {
  color: rgba(255, 255, 255, 0.55);
  text-decoration: none;
  font-size: 13.5px;
  font-weight: 500;
  padding: 6px 16px;
  border-radius: 8px;
  transition: color 0.18s ease, background 0.18s ease;
  letter-spacing: -0.01em;
  white-space: nowrap;
}

.nav-menu a:hover {
  color: #fff;
  background: rgba(255, 255, 255, 0.06);
}

.nav-menu a.active {
  color: #5B8CFF;
  background: rgba(51, 100, 217, 0.1);
}

/* ===== Category Dropdown ===== */
.nav-dropdown-wrap { position: relative; }

.nav-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  width: 256px;
  background: rgba(10, 13, 28, 0.99);
  border: 1px solid rgba(51, 100, 217, 0.22);
  border-radius: 14px;
  padding: 8px;
  opacity: 0;
  visibility: hidden;
  transform: translateX(-50%) translateY(-6px);
  transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s 0.18s;
  z-index: 300;
  box-shadow: 0 20px 60px rgba(0,0,20,0.85), 0 4px 16px rgba(51,100,217,0.18);
}

.nav-dropdown-wrap:hover .nav-dropdown {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0);
  transition: opacity 0.18s ease, transform 0.18s ease;
}

.nav-dd-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 9px;
  color: rgba(255,255,255,0.72);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.01em;
  transition: all 0.15s ease;
}
.nav-dd-item:hover { color: #fff; background: rgba(51,100,217,0.13); }
.nav-dd-item.soon { color: rgba(255,255,255,0.22); cursor: default; pointer-events: none; }

.nav-dd-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: rgba(51,100,217,0.11);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}

.nav-dd-badge {
  font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 100px;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.28);
  margin-left: auto;
}

.nav-dd-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 4px 8px; }

/* ===== Mobile ===== */
@media (max-width: 900px) {
  .nav-row1 { padding: 0 20px; gap: 14px; }
  .nav-menu  { padding: 0 20px; }
  .nav-search { max-width: 260px; }
}

@media (max-width: 640px) {
  .nav-logo   { font-size: 18px; }
  .logo-the   { font-size: 12px; }
  .nav-mdbf span { display: none; }
  .nav-search { max-width: 180px; }
  .nav-menu   { justify-content: flex-start; overflow-x: auto; }
}
</style>
</head>
<body>

<header>

  <!-- Row 1 -->
  <div class="nav-row1">
    <a class="nav-logo" href="https://mdbf.co.kr" target="_top">
      <span class="logo-the">the </span><span class="logo-M">M</span>asterclass
    </a>

    <div class="nav-search">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" placeholder="강좌 검색..." aria-label="강좌 검색">
    </div>

    <a class="nav-mdbf" href="https://mdbf.co.kr" target="_top" rel="noopener" title="몽당분필 MDBF">
      <img src="../assets/mdbf-logo.png" alt="몽당분필 MDBF 로고" onerror="this.style.display='none'">
      <span>몽당분필</span>
    </a>
  </div>

  <!-- Row 2 -->
  <div class="nav-row2">
    <ul class="nav-menu">
      <li class="nav-dropdown-wrap" id="cat-wrap">
        <a href="https://mdbf-masterclass.vercel.app/category" target="_top" class="nav-cat-link">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <rect x="0" y="0" width="6.5" height="6.5" rx="1.5"/>
            <rect x="9.5" y="0" width="6.5" height="6.5" rx="1.5"/>
            <rect x="0" y="9.5" width="6.5" height="6.5" rx="1.5"/>
            <rect x="9.5" y="9.5" width="6.5" height="6.5" rx="1.5"/>
          </svg>
          카테고리
        </a>
        <div class="nav-dropdown">
          <a class="nav-dd-item" href="https://mdbf-masterclass.vercel.app/category/ai" target="_top">
            <span class="nav-dd-icon">🤖</span> AI / AX
          </a>
          <a class="nav-dd-item" href="https://mdbf-masterclass.vercel.app/category/automation" target="_top">
            <span class="nav-dd-icon">⚙️</span> 업무 자동화
          </a>
          <a class="nav-dd-item" href="https://mdbf-masterclass.vercel.app/category/media" target="_top">
            <span class="nav-dd-icon">🎬</span> 이미지 / 영상
          </a>
          <a class="nav-dd-item" href="https://mdbf-masterclass.vercel.app/category/edutech" target="_top">
            <span class="nav-dd-icon">📱</span> 에듀테크
          </a>
          <div class="nav-dd-divider"></div>
          <a class="nav-dd-item soon" href="#">
            <span class="nav-dd-icon">📚</span> 수업 자료 <span class="nav-dd-badge">Soon</span>
          </a>
          <a class="nav-dd-item soon" href="#">
            <span class="nav-dd-icon">🎨</span> 디자인 / 드로잉 <span class="nav-dd-badge">Soon</span>
          </a>
        </div>
      </li>
      <li><a href="https://mdbf-masterclass.vercel.app/about" target="_top">소개</a></li>
      <li><a href="https://mdbf-masterclass.vercel.app/membership" target="_top">멤버십</a></li>
      <li><a href="https://mdbf-masterclass.vercel.app/resources" target="_top">자료실</a></li>
      <li><a href="https://mdbf-masterclass.vercel.app/notice" target="_top">공지사항</a></li>
    </ul>
  </div>

</header>


<script>
// Resize parent iframe on dropdown open/close
const catWrap = document.getElementById('cat-wrap');
if (catWrap) {
  catWrap.addEventListener('mouseenter', () => {
    window.parent.postMessage({type:'mcResize', id:'navbar', height: 370}, '*');
  });
  catWrap.addEventListener('mouseleave', () => {
    window.parent.postMessage({type:'mcResize', id:'navbar', height: 108}, '*');
  });
}
</script>
</body>
</html>
