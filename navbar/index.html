<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar — the Masterclass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 108px;
  overflow: hidden;
}

body {
  background: rgba(7, 9, 20, 0.97);
  border-bottom: 1px solid rgba(51, 100, 217, 0.15);
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ===== Row 1: Logo · Search · MDBF ===== */
.nav-row1 {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 20px;
}

/* Logo */
.nav-logo {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: #fff;
  text-decoration: none;
  letter-spacing: -0.03em;
  flex-shrink: 0;
  display: flex;
  align-items: baseline;
  line-height: 1;
}

.logo-the {
  font-size: 14px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.38);
  margin-right: 4px;
  letter-spacing: 0.01em;
}

.logo-M { color: #3364D9; }

/* Search */
.nav-search {
  flex: 1;
  max-width: 420px;
  position: relative;
}

.nav-search input {
  width: 100%;
  height: 38px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 100px;
  padding: 0 16px 0 38px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.8);
  font-family: 'Pretendard', sans-serif;
  letter-spacing: -0.01em;
  transition: all 0.2s ease;
  outline: none;
}

.nav-search input::placeholder { color: rgba(255, 255, 255, 0.28); }

.nav-search input:focus {
  background: rgba(255, 255, 255, 0.09);
  border-color: rgba(51, 100, 217, 0.5);
  box-shadow: 0 0 0 3px rgba(51, 100, 217, 0.12);
}

.search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: rgba(255, 255, 255, 0.3);
}

/* 몽당분필 */
.nav-mdbf {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: rgba(255, 255, 255, 0.6);
  font-size: 13px;
  font-weight: 500;
  padding: 7px 13px;
  border-radius: 9px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.2s ease;
  flex-shrink: 0;
  letter-spacing: -0.01em;
}

.nav-mdbf img {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  flex-shrink: 0;
}

.nav-mdbf:hover {
  color: rgba(255, 255, 255, 0.9);
  border-color: rgba(51, 100, 217, 0.4);
  background: rgba(51, 100, 217, 0.08);
}

/* ===== Row 2: Menu ===== */
.nav-row2 {
  border-top: 1px solid rgba(255, 255, 255, 0.05);
}

.nav-menu {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 32px;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 2px;
  list-style: none;
  justify-content: center;
}

.nav-menu a {
  color: rgba(255, 255, 255, 0.55);
  text-decoration: none;
  font-size: 13.5px;
  font-weight: 500;
  padding: 6px 16px;
  border-radius: 8px;
  transition: color 0.18s ease, background 0.18s ease;
  letter-spacing: -0.01em;
  white-space: nowrap;
}

.nav-menu a:hover {
  color: #fff;
  background: rgba(255, 255, 255, 0.06);
}

.nav-menu a.active {
  color: #5B8CFF;
  background: rgba(51, 100, 217, 0.1);
}

/* ===== Mobile ===== */
@media (max-width: 900px) {
  .nav-row1 { padding: 0 20px; gap: 14px; }
  .nav-menu  { padding: 0 20px; }
  .nav-search { max-width: 260px; }
}

@media (max-width: 640px) {
  .nav-logo   { font-size: 18px; }
  .logo-the   { font-size: 12px; }
  .nav-mdbf span { display: none; }
  .nav-search { max-width: 180px; }
  .nav-menu   { justify-content: flex-start; overflow-x: auto; }
}
</style>
</head>
<body>

<header>

  <!-- Row 1 -->
  <div class="nav-row1">
    <a class="nav-logo" href="https://mdbf.co.kr" target="_top">
      <span class="logo-the">the </span><span class="logo-M">M</span>asterclass
    </a>

    <div class="nav-search">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" placeholder="강좌 검색..." aria-label="강좌 검색">
    </div>

    <a class="nav-mdbf" href="https://mdbf.co.kr" target="_top" rel="noopener" title="몽당분필 MDBF">
      <img src="../assets/mdbf-logo.png" alt="몽당분필 MDBF 로고" onerror="this.style.display='none'">
      <span>몽당분필</span>
    </a>
  </div>

  <!-- Row 2 -->
  <div class="nav-row2">
    <ul class="nav-menu">
      <li><a href="https://mdbf.co.kr" target="_top">소개</a></li>
      <li><a href="https://mdbf.co.kr" target="_top" class="active">강좌 신청</a></li>
      <li><a href="https://mdbf.co.kr" target="_top">멤버십</a></li>
      <li><a href="https://mdbf.co.kr" target="_top">자료실</a></li>
      <li><a href="https://mdbf.co.kr" target="_top">공지사항</a></li>
    </ul>
  </div>

</header>

</body>
</html>
