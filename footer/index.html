<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footer — the Masterclass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=Montserrat:wght@300;400;500&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #07090F;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ===== SITE FOOTER ===== */
.site-footer {
  background: #0B0D16;
  border-top: 1px solid rgba(51, 100, 217, 0.15);
  padding: 52px 0 36px;
  color: rgba(255,255,255,0.55);
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  letter-spacing: -0.01em;
}

.footer-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 48px;
}

/* TOP ROW: brand logo + studio credit */
.footer-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 32px;
}

.footer-brand {
  display: flex;
  align-items: center;
  gap: 16px;
}

.footer-logo-mark {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
}

.footer-logo-text {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.logo-name {
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  line-height: 1.3;
}

.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.03em;
}

/* Studio credit (right side) */
.footer-studio {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
}

.studio-label {
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.studio-logo-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  text-decoration: none;
  transition: opacity 0.2s ease;
}
.studio-logo-link:hover { opacity: 0.75; }

.ps-signature {
  font-family: 'Covered By Your Grace', cursive;
  font-size: 20px;
  color: #FFB11A;
  line-height: 1;
}

.ps-ig-icon {
  color: rgba(255,255,255,0.25);
  flex-shrink: 0;
}

/* DIVIDER */
.footer-divider {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin-bottom: 28px;
}

/* MID ROW: quick nav + SNS */
.footer-mid {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 32px;
  margin-bottom: 28px;
}

.footer-nav-block {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.footer-nav-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
}

.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 20px;
}

.footer-links a {
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  font-size: 13px;
  transition: color 0.2s ease;
}
.footer-links a:hover { color: rgba(255,255,255,0.9); }

/* SNS block */
.footer-sns-block {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
}

.footer-sns-links {
  display: flex;
  gap: 10px;
}

.sns-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  transition: all 0.2s ease;
  font-size: 14px;
}
.sns-btn:hover {
  background: rgba(51,100,217,0.25);
  border-color: rgba(51,100,217,0.5);
  color: #fff;
}

/* BOTTOM ROW: legal */
.footer-bottom {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.footer-info {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px 0;
}

.footer-info-item {
  color: rgba(255,255,255,0.3);
  font-size: 12px;
}

.footer-info-item::after {
  content: '·';
  margin: 0 10px;
  color: rgba(255,255,255,0.12);
}
.footer-info-item:last-child::after { display: none; }

.footer-info-item a {
  color: inherit;
  text-decoration: none;
  transition: color 0.2s;
}
.footer-info-item a:hover { color: rgba(255,255,255,0.65); }

.footer-copy {
  font-size: 11px;
  color: rgba(255,255,255,0.18);
  letter-spacing: 0.01em;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .footer-inner { padding: 0 28px; }
  .footer-top { flex-direction: column; align-items: flex-start; gap: 20px; }
  .footer-studio { align-items: flex-start; }
  .footer-mid { flex-direction: column; gap: 20px; }
  .footer-sns-block { align-items: flex-start; }
}

@media (max-width: 480px) {
  .site-footer { padding: 40px 0 28px; }
  .footer-inner { padding: 0 20px; }
  .logo-name { font-size: 13px; }
}
</style>
</head>
<body>
