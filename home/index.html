<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the Masterclass — 교사의 첫 걸음</title>
<meta name="description" content="MDBF the Masterclass · 교사가 가르치는 교사 연수 플랫폼. 현장에서 검증된 6개 트랙.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Pretendard:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { overflow-x: hidden; max-width: 100vw; }

  body {
    background: #FAFBFF;
    color: #1a1f2e;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.5;
    letter-spacing: -0.01em;
  }

  /* ===== Hero ===== */
  .embed-hero {
    width: 100%;
    height: 100vh;
    height: 100svh;
    border: 0;
    display: block;
    background: #000;
  }

  /* ===== Gap 48px ===== */
  .gap { height: 48px; }

  /* ===== Classes (height grows via postMessage) ===== */
  .embed-classes {
    width: 100%;
    border: 0;
    display: block;
    height: 1180px; /* default fallback; JS overrides via postMessage */
    transition: height 0.3s ease;
  }

  /* ===== Banner 4:1 ===== */
  .embed-banner-wrap {
    padding: 0 32px;
  }
  .embed-banner {
    width: 100%;
    aspect-ratio: 4 / 1;
    border: 0;
    display: block;
  }

  /* ===== Signature ===== */
  .signature {
    text-align: center;
    padding: 56px 32px 40px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 11px;
    color: rgba(26, 31, 46, 0.4);
    letter-spacing: 0.08em;
  }
  .signature a {
    color: inherit;
    text-decoration: none;
    transition: color 0.2s;
  }
  .signature a:hover { color: rgba(26, 31, 46, 0.7); }

  /* ===== Responsive ===== */
  @media (max-width: 1024px) {
    .embed-classes { height: 1500px; }
  }
  @media (max-width: 768px) {
    .embed-classes { height: 1800px; }
    .embed-banner-wrap { padding: 0 20px; }
  }
  @media (max-width: 480px) {
    .embed-classes { height: 2400px; }
    .embed-banner-wrap { padding: 0 16px; }
    .gap { height: 36px; }
    .signature { padding: 40px 20px 32px; }
  }
</style>
</head>
<body>

<iframe class="embed-hero" src="../hero/" loading="eager" title="the Masterclass Hero"></iframe>

<div class="gap"></div>

<iframe class="embed-classes" id="classesFrame" src="../classes/" loading="lazy" title="클래스별 강좌"></iframe>

<div class="gap"></div>

<div class="embed-banner-wrap">
  <iframe class="embed-banner" src="../banner/" loading="lazy" title="배너"></iframe>
</div>

<footer class="signature">
  Designed by parcyun studio · <a href="https://www.instagram.com/parcyun" target="_blank" rel="noopener">@parcyun</a>
</footer>

<script>
  // Receive content height from /classes/ iframe and set exact height
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'mdbf-classes-height') {
      const frame = document.getElementById('classesFrame');
      if (frame && e.data.height > 0) {
        frame.style.height = e.data.height + 'px';
      }
    }
  });
</script>

</body>
</html>
